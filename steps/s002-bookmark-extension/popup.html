<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body { font-family: sans-serif; padding: 10px; width: 200px; }
    input { width: 100%; margin: 5px 0; }
    button { width: 100%; }
  </style>
</head>
<body>
  <h3>Login</h3>
  <input type="text" id="username" placeholder="Username" />
  <input type="password" id="password" placeholder="Password" />
  <button id="save">Save Credentials</button>
  <hr />
  <button id="send">Send Current URL</button>
  <p id="status"></p>
  <script src="popup.js"></script>
</body>
</html>
